<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .input-group {
        margin-bottom: 12px;
      }
      input,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #222;
        color: #fff;
        font-size: 14px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:hover {
        background: #2563eb;
      }
      .status {
        margin-top: 12px;
        padding: 8px;
        border-radius: 6px;
        font-size: 13px;
        display: none;
      }
      .status.success {
        background: #065f46;
        display: block;
      }
      .status.error {
        background: #7f1d1d;
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>⬇ Motrix AI</h1>
    <div class="input-group">
      <input type="text" id="url" placeholder="Paste URL, magnet, or ed2k link..." />
    </div>
    <button id="download">Download</button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
