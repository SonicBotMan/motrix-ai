name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-quality:
    name: Backend Quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          - os: macos-latest
            install_deps: 'echo "macOS deps handled by Xcode"'
          - os: windows-latest
            install_deps: 'echo "Windows deps handled by MSVC"'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: ${{ matrix.install_deps }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/gui/src-tauri

      - name: Format Check
        run: cd apps/gui/src-tauri && cargo fmt --check

      - name: Clippy
        run: cd apps/gui/src-tauri && cargo clippy -- -D warnings

      - name: Check
        run: cd apps/gui/src-tauri && cargo check

      - name: Test
        run: cd apps/gui/src-tauri && cargo test

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: npm audit (advisory, high+ severity)
        run: pnpm audit --audit-level high || true
        continue-on-error: true
