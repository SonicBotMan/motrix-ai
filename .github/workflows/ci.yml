name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm prettier --check .

      - name: Type Check (vue-tsc)
        run: cd apps/gui && npx vue-tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-quality:
    name: Backend Quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            install_deps: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          - os: macos-latest
            install_deps: 'echo "macOS deps handled by Xcode"'
          - os: windows-latest
            install_deps: 'echo "Windows deps handled by MSVC"'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: ${{ matrix.install_deps }}

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          workspaces: apps/gui/src-tauri

      - name: Format Check
        run: cd apps/gui/src-tauri && cargo fmt --check

      - name: Clippy
        run: cd apps/gui/src-tauri && cargo clippy -- -D warnings

      - name: Check
        run: cd apps/gui/src-tauri && cargo check

      - name: Test
        run: cd apps/gui/src-tauri && cargo test

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: npm audit (advisory, high+ severity)
        run: pnpm audit --audit-level high || true
        continue-on-error: true
