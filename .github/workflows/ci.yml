name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build native modules
        run: pnpm rebuild better-sqlite3 esbuild

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/gui/src-tauri

      - name: Format Check
        run: cd apps/gui/src-tauri && cargo fmt --check

      - name: Clippy
        run: cd apps/gui/src-tauri && cargo clippy -- -D warnings

      - name: Check
        run: cd apps/gui/src-tauri && cargo check

      - name: Test
        run: cd apps/gui/src-tauri && cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Audit Rust dependencies (advisory)
        run: cd apps/gui/src-tauri && cargo audit || true
        continue-on-error: true

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: npm audit (advisory, high+ severity)
        run: pnpm audit --audit-level high || true
        continue-on-error: true
